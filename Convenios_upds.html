<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            /* Paleta Institucional UPDS */
            --primary: #1f3189;     
            --secondary: #18419b;   
            --accent: #249cdd;      
            --white: #ffffff;
            --light-bg: #f0f4f8;
            --text-dark: #2d3748;
            --text-gray: #4a5568;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* --- CABECERA (HEADER) MEJORADA --- */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 50px 20px 80px 20px; /* Más espacio abajo para montar el buscador */
            text-align: center;
            color: var(--white);
            position: relative;
        }

        .header img {
            height: 120px; /* LOGO MUCHO MÁS GRANDE */
            width: auto;
            background: var(--white);
            padding: 15px 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            object-fit: contain;
        }

        .header h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            margin: 0;
            font-size: 32px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            margin-top: 10px;
            font-weight: 400;
            opacity: 0.85;
        }

        /* --- BUSCADOR FLOTANTE --- */
        .search-container {
            max-width: 700px;
            margin: -35px auto 40px auto; /* Montado sobre el header */
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .search-box {
            width: 100%;
            padding: 20px 25px 20px 60px;
            font-size: 16px;
            color: var(--text-dark);
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 51, 102, 0.08);
            outline: none;
            font-family: 'Open Sans', sans-serif;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(36, 156, 221, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 45px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 20px;
        }

        /* --- CONTENEDOR DE TARJETAS --- */
        .grid-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
        }

        /* --- DISEÑO DE TARJETA (NUEVA JERARQUÍA) --- */
        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 30px; /* Más aire y elegancia */
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            border-top: 5px solid var(--accent);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }

        /* 1. EL NOMBRE ES LO PRINCIPAL */
        .card-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin: 0 0 10px 0;
            line-height: 1.3;
            order: 1; /* Forzamos a que esté arriba */
        }

        /* 2. LA CATEGORÍA VA DESPUÉS (Sutil) */
        .card-category {
            font-size: 11px;
            font-weight: 700;
            color: var(--secondary);
            background-color: #e6f0fa;
            padding: 6px 12px;
            border-radius: 6px;
            align-self: flex-start;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            order: 2;
        }

        /* 3. EL BENEFICIO */
        .card-content-wrapper {
            order: 3;
            flex-grow: 1;
        }

        .card-benefit {
            font-size: 14px;
            color: var(--text-gray);
            line-height: 1.6;
            margin: 0;
        }

        .leer-mas {
            color: var(--accent);
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            display: inline-block;
            margin-top: 8px;
            transition: color 0.2s;
        }

        .leer-mas:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* 4. EL FOOTER (FECHA) */
        .card-footer {
            order: 4;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-gray);
        }

        .card-footer i {
            color: var(--accent);
            font-size: 16px;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray);
            font-family: 'Montserrat', sans-serif;
        }
        
        .no-results i {
            font-size: 40px;
            color: #cbd5e0;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

        const contenedor = document.getElementById('conveniosContainer');

        // Renderizado de las tarjetas con truncamiento de texto
        function renderizarTarjetas(datos) {
            contenedor.innerHTML = '';
            
            if (datos.length === 0) {
                contenedor.innerHTML = `
                    <div class="no-results">
                        <i class="fa-solid fa-folder-open"></i>
                        <h2>No encontramos lo que buscas</h2>
                        <p>Intenta usar otras palabras clave como "Prácticas", "Salud" o el nombre de una empresa.</p>
                    </div>`;
                return;
            }

            datos.forEach(item => {
                const limiteCaracteres = 100;
                let textoMostrar = item.beneficio;
                let botonHtml = '';

                // Lógica del botón "Ver más"
                if (item.beneficio.length > limiteCaracteres) {
                    textoMostrar = item.beneficio.substring(0, limiteCaracteres) + '...';
                    
                    const tCompleto = item.beneficio.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                    const tCorto = textoMostrar.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                    
                    botonHtml = `<span class="leer-mas" onclick="alternarTexto(this, '${tCompleto}', '${tCorto}')">Ver más <i class="fa-solid fa-chevron-down" style="font-size: 10px; margin-left: 3px;"></i></span>`;
                }

                // Validación de fechas
                let textoFecha = item.fecha;
                let iconoFecha = "fa-calendar-check";
                if(textoFecha.includes("Indefinido")) {
                    iconoFecha = "fa-infinity";
                    textoFecha = "Vigencia Indefinida";
                } else {
                    textoFecha = "Válido hasta: " + textoFecha;
                }

                const tarjeta = `
                    <div class="card">
                        <h3 class="card-title">${item.empresa}</h3>
                        <span class="card-category">${item.categoria}</span>
                        
                        <div class="card-content-wrapper">
                            <p class="card-benefit">${textoMostrar}</p>
                            ${botonHtml}
                        </div>

                        <div class="card-footer">
                            <i class="fa-solid ${iconoFecha}"></i> 
                            <span>${textoFecha}</span>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += tarjeta;
            });
        }

        // Lógica de expandir texto
        function alternarTexto(btn, textoCompleto, textoCorto) {
            const parrafo = btn.previousElementSibling;
            
            if (btn.innerText.includes('Ver más')) {
                parrafo.innerText = textoCompleto;
                btn.innerHTML = 'Ver menos <i class="fa-solid fa-chevron-up" style="font-size: 10px; margin-left: 3px;"></i>';
            } else {
                parrafo.innerText = textoCorto;
                btn.innerHTML = 'Ver más <i class="fa-solid fa-chevron-down" style="font-size: 10px; margin-left: 3px;"></i>';
            }
        }

        // Motor de búsqueda en tiempo real
        function filtrarDatos() {
            const textoBuscado = document.getElementById('searchInput').value.toLowerCase();
            
            const datosFiltrados = convenios.filter(item => {
                return item.empresa.toLowerCase().includes(textoBuscado) || 
                       item.categoria.toLowerCase().includes(textoBuscado) || 
                       item.beneficio.toLowerCase().includes(textoBuscado);
            });
            
            renderizarTarjetas(datosFiltrados);
        }

        window.onload = () => renderizarTarjetas(convenios);
